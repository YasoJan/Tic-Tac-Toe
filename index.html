<!DOCTYPE html>
<html lang="en">
<head>
  <link href = "styles.css" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
</head>
<body>
  <div class = "header">
    <h1>Tic-Tac-Toe!</h1>
  </div>
  <div class = "container">
  <div class = "board">
    <div class = "top-row">
      <div class = "q1">1</div>
      <div class = "q2">2</div>
      <div class = "q3">3</div>
    </div>
    <div class = "middle-row">
      <div class = "q4">4</div>
      <div class = "q5">5</div>
      <div class = "q6">6</div>
    </div>
    <div class = "bottom-row">
      <div class = "q7">7</div>
      <div class = "q8">8</div>
      <div class = "q9">9</div>
    </div>
  </div>
  </div>
</body>
<script src = "script.js"></script>
</html>
